<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App - Simple Task Manager</title>
    <meta name="description" content="A simple and elegant to-do list application with local storage. Manage your tasks efficiently.">
    <link rel="stylesheet" href="todo-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <!-- Header Section -->
            <div class="todo-header">
                <h1><i class="fas fa-tasks"></i> My To-Do List</h1>
                <p class="subtitle">Stay organized and boost your productivity</p>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        All
                    </button>
                    <button class="filter-btn" data-filter="active">
                        Active
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        Completed
                    </button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-label">Total Tasks:</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Remaining:</span>
                    <span class="stat-value" id="remainingTasks">0</span>
                </div>
            </div>

            <!-- Tasks List Section -->
            <div class="tasks-section">
                <ul id="todoList" class="todo-list">
                    <!-- Tasks will be added here dynamically -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompleted" class="btn btn-secondary">
                    <i class="fas fa-trash"></i> Clear Completed
                </button>
                <button id="clearAll" class="btn btn-danger">
                    <i class="fas fa-exclamation-triangle"></i> Clear All
                </button>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Confirm Action</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">Are you sure?</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-danger" id="confirmBtn">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="todo-script.js"></script>
</body>
</html>
